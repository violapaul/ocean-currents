# Shilshole to Three Tree Point and back
#
# Run with:
#   conda run -n anaconda python run_route.py routes/shilshole_ttp_return.yaml

task:
  name: "Shilshole → Three Tree Point → Shilshole"
  description: >
    Down Puget Sound from Shilshole Bay Marina to just south of Three Tree Point,
    then return.  Useful for checking how tidal currents affect timing on a
    southbound vs northbound leg.

departure:
  datetime: "2026-03-07 10:30"
  tz: "America/Los_Angeles"

waypoints:
  - [47.682919, -122.412349]    # Shilshole Bay Marina (start/finish)
  - [47.449485, -122.384278]    # Three Tree Point area turnaround
  - [47.682919, -122.412349]    # Return to Shilshole

boat:
  speed_kt: 6.0
  polar: "../../j105_new_polars.csv"
  minimum_twa: 38
  maximum_twa: 165

wind:
  source: "open_meteo_ecmwf"

routing:
  router_type: "sector"
  tack_penalty_s: 90
  tack_threshold_deg: 50
  gybe_penalty_s: 90
  gybe_threshold_deg: 120
  duration_hours: 10
  polar_sweep_coarse_step: 3
  use_dense_polar: true
  use_dot_filter: false

output:
  save_plots: true
  plot_dir: "routes/output"
