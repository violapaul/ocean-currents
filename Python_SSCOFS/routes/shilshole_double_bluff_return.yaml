# Shilshole → Double Bluff → Shilshole (round-trip race, 2026-04-25)
#
# ECMWF wind routing. Leg 1 is an upwind beat toward Double Bluff;
# Leg 2 is the downwind return to Shilshole.
#
# Run with:
#   conda run -n anaconda python run_route.py routes/shilshole_double_bluff_return.yaml

task:
  name: "Shilshole → Double Bluff → Shilshole"
  description: >
    Round-trip race up to Double Bluff (Whidbey Island) and back to Shilshole.
    NW thermal building through the day.

departure:
  datetime: "2026-04-25 09:15"
  tz: "America/Los_Angeles"

waypoints:
  - [47.68619881085159, -122.41359007579005]    # Shilshole Marina (start)
  - [47.964840250731996, -122.55132622218066]   # Double Bluff (turn)
  - [47.68619881085159, -122.41359007579005]    # Shilshole Marina (finish)

boat:
  speed_kt: 6.0
  polar: "../../j105_new_polars.csv"
  minimum_twa: 38
  maximum_twa: 165

wind:
  source: "open_meteo_ecmwf"
  timezone: "America/Los_Angeles"

routing:
  router_type: "sector"
  tack_penalty_s: 90
  tack_threshold_deg: 50
  gybe_penalty_s: 90
  gybe_threshold_deg: 120
  duration_hours: 8                # ~6.5 hr expected, +1.5 hr slack
  polar_sweep_coarse_step: 3
  use_dense_polar: true
  use_dot_filter: false

output:
  save_plots: true
  # plot_dir defaults to routes/output/<yaml-stem>/
